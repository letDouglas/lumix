services:
  minio:
    image: minio/minio
    container_name: lumix-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: lumix
      MINIO_ROOT_PASSWORD: 123456789
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - lumix-net

networks:
  lumix-net:
    driver: bridge

volumes:
  minio-data:
